<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScoreBlur License</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f8fb; color: #182033; }
    main { width: min(560px, calc(100vw - 32px)); padding: 28px; background: #fff; border: 1px solid #d9deea; border-radius: 8px; box-shadow: 0 16px 40px rgba(24, 32, 51, .08); }
    h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.25; font-weight: 700; }
    p { margin: 0 0 18px; line-height: 1.5; color: #465066; }
    button { appearance: none; border: 0; border-radius: 6px; padding: 10px 14px; background: #1957d2; color: white; font-weight: 650; cursor: pointer; }
    button:disabled { opacity: .55; cursor: default; }
    code { display: block; overflow-wrap: anywhere; padding: 10px; border-radius: 6px; background: #edf1f7; color: #182033; }
    .error { color: #8a1f17; }
    .ok { color: #1e6b35; }
  </style>
</head>
<body>
  <main>
    <h1>ScoreBlur License</h1>
    <p id="status">Opening secure checkout...</p>
    <button id="openBtn" type="button">Open checkout</button>
    <p id="manualWrap" hidden>Copy this key into ScoreBlur if automatic activation did not finish:</p>
    <code id="manualKey" hidden></code>
  </main>

  <script>
    (function () {
      var PRODUCT_ID = '31144';
      var PLAN_ID = '51091';
      var LICENSE_RESOLVER_URL = 'https://vercel-resolver-sepia.vercel.app/api/resolve-license';
      var HOSTED_CHECKOUT_URL = 'https://checkout.freemius.com/app/' + PRODUCT_ID + '/plan/' + PLAN_ID + '/';
      var BILLING_CYCLE = { monthly: 'monthly', yearly: 'annual', lifetime: 'lifetime' };
      var ACTIVATION_TIMEOUT_MS = 45000;
      var DEV_REDIRECT_RELAY_TIMEOUT_MS = 8000;

      var params = new URLSearchParams(location.search);
      var extensionId = params.get('ext_id') || '';
      var plan = params.get('plan') || '';
      var trial = params.get('trial') === '1' || params.get('trial') === 'free';
      var upgrade = params.get('upgrade') === '1';
      var requestedDev = params.get('env') === 'dev';
      var sandboxToken = params.get('sandbox') || '';
      var sandboxCtx = params.get('s_ctx_ts') || '';
      var isLocalBridge = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
      var isDev = requestedDev && isLocalBridge;
      var hasSignedRedirect = !!(params.get('license_id') && params.get('signature'));

      var statusEl = document.getElementById('status');
      var openBtn = document.getElementById('openBtn');
      var manualWrap = document.getElementById('manualWrap');
      var manualKey = document.getElementById('manualKey');

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = kind || '';
      }

      function showManualKey(key) {
        if (!key) return;
        manualWrap.hidden = false;
        manualKey.hidden = false;
        manualKey.textContent = key;
      }

      function resetCheckoutState() {
        openBtn.disabled = false;
        manualWrap.hidden = true;
        manualKey.hidden = true;
        manualKey.textContent = '';
      }

      function buildHostedCheckoutUrl(upgradeLicenseKey) {
        var checkoutParams = new URLSearchParams();
        if (isDev) {
          checkoutParams.set('sandbox', sandboxToken);
          checkoutParams.set('s_ctx_ts', sandboxCtx);
        }
        if (trial) checkoutParams.set('trial', 'free');
        if (BILLING_CYCLE[plan]) checkoutParams.set('billing_cycle', BILLING_CYCLE[plan]);
        if (upgradeLicenseKey) checkoutParams.set('license_key', upgradeLicenseKey);
        var query = checkoutParams.toString();
        return query ? HOSTED_CHECKOUT_URL + '?' + query : HOSTED_CHECKOUT_URL;
      }

      function requestUpgradeLicenseKey() {
        return new Promise(function (resolve) {
          if (!upgrade) {
            resolve('');
            return;
          }
          if (!extensionId || !window.chrome || !chrome.runtime || !chrome.runtime.sendMessage) {
            resolve('');
            return;
          }
          chrome.runtime.sendMessage(extensionId, {
            type: 'GET_ACTIVE_LICENSE_FOR_CHECKOUT',
            upgrade: true
          }, function (response) {
            var err = chrome.runtime.lastError;
            var key = response && response.licenseKey;
            if (err || !response || response.success !== true || !key) {
              resolve('');
              return;
            }
            resolve(String(key).trim());
          });
        });
      }

      function activateViaContentRelay(key, eventName, licenseEnvironment) {
        return new Promise(function (resolve) {
          var requestId = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
          var timer = null;

          function cleanup(result) {
            if (timer) window.clearTimeout(timer);
            window.removeEventListener('message', onMessage);
            resolve(result);
          }

          function onMessage(event) {
            if (event.source !== window || event.origin !== location.origin) return;
            var data = event.data || {};
            if (
              data.source !== 'scoreblur-extension' ||
              data.type !== 'SCOREBLUR_ACTIVATE_LICENSE_RESULT' ||
              data.requestId !== requestId
            ) {
              return;
            }
            cleanup({
              success: data.success === true,
              reason: typeof data.reason === 'string' ? data.reason : ''
            });
          }

          window.addEventListener('message', onMessage);
          timer = window.setTimeout(function () { cleanup(null); }, ACTIVATION_TIMEOUT_MS);
          window.postMessage({
            source: 'scoreblur-license-bridge',
            type: 'SCOREBLUR_ACTIVATE_LICENSE',
            requestId: requestId,
            licenseKey: key,
            checkoutEvent: eventName,
            licenseEnvironment: licenseEnvironment
          }, location.origin);
        });
      }

      function activateSignedRedirectViaContentRelay(eventName) {
        return new Promise(function (resolve) {
          var requestId = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
          var timer = null;

          function cleanup(result) {
            if (timer) window.clearTimeout(timer);
            window.removeEventListener('message', onMessage);
            resolve(result);
          }

          function onMessage(event) {
            if (event.source !== window || event.origin !== location.origin) return;
            var data = event.data || {};
            if (
              data.source !== 'scoreblur-extension' ||
              data.type !== 'SCOREBLUR_ACTIVATE_LICENSE_RESULT' ||
              data.requestId !== requestId
            ) {
              return;
            }
            cleanup({
              success: data.success === true,
              reason: typeof data.reason === 'string' ? data.reason : ''
            });
          }

          window.addEventListener('message', onMessage);
          timer = window.setTimeout(function () { cleanup(null); }, DEV_REDIRECT_RELAY_TIMEOUT_MS);
          window.postMessage({
            source: 'scoreblur-license-bridge',
            type: 'SCOREBLUR_RESOLVE_SIGNED_REDIRECT',
            requestId: requestId,
            redirectUrl: location.href,
            checkoutEvent: eventName
          }, location.origin);
        });
      }

      function activateViaExternalMessage(key, eventName, licenseEnvironment) {
        return new Promise(function (resolve) {
          if (!extensionId || !window.chrome || !chrome.runtime || !chrome.runtime.sendMessage) {
            resolve(null);
            return;
          }

          chrome.runtime.sendMessage(extensionId, {
            type: 'ACTIVATE_LICENSE_FROM_BRIDGE',
            licenseKey: key,
            confirmed: true,
            trial: trial,
            checkoutEvent: eventName,
            licenseEnvironment: licenseEnvironment
          }, function (response) {
            var err = chrome.runtime.lastError;
            if (err || !response) {
              resolve({
                success: false,
                reason: err && err.message ? err.message : 'extension_unreachable'
              });
              return;
            }
            resolve({
              success: response.success === true,
              reason: typeof response.reason === 'string' ? response.reason : ''
            });
          });
        });
      }

      async function forwardKey(key, eventName, licenseEnvironment) {
        setStatus('Checkout completed. Activating license...', '');

        var relayResult = await activateViaContentRelay(key, eventName, licenseEnvironment);
        if (relayResult && relayResult.success) {
          setStatus('License activated. You can close this tab.', 'ok');
          return;
        }

        var externalResult = await activateViaExternalMessage(key, eventName, licenseEnvironment);
        if (externalResult && externalResult.success) {
          setStatus('License activated. You can close this tab.', 'ok');
          return;
        }

        var reason = (relayResult && relayResult.reason) || (externalResult && externalResult.reason) || '';
        if (reason === 'device_limit') {
          setStatus('Checkout completed, but this license has reached its device limit. Free an activation slot in Manage plan & billing, then activate this license again. A new checkout is not needed.', 'error');
          showManualKey(key);
          return;
        }
        if (reason === 'sandbox_license_not_allowed') {
          setStatus('Freemius Sandbox checkout completed, but production ScoreBlur cannot activate sandbox licenses. For a real subscription, open checkout from the production extension build.', 'error');
          return;
        }
        var suffix = reason ? ' (' + reason + ')' : '';
        setStatus('Checkout completed, but automatic activation did not finish' + suffix + '. Use the key below.', 'error');
        showManualKey(key);
      }

      async function resolveSignedRedirect() {
        openBtn.disabled = true;
        openBtn.hidden = true;
        setStatus('Verifying checkout and activating license...', '');

        if (!LICENSE_RESOLVER_URL || LICENSE_RESOLVER_URL.indexOf('__') === 0) {
          setStatus('Automatic activation service is not configured. Check your purchase email and activate with the license key.', 'error');
          return;
        }

        try {
          var res = await fetch(LICENSE_RESOLVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'omit',
            body: JSON.stringify({ redirectUrl: location.href })
          });
          var body = await res.json().catch(function () { return {}; });
          if (!res.ok || !body || body.success !== true || !body.licenseKey) {
            if (body && body.reason === 'license_environment_mismatch') {
              var devRelayResult = await activateSignedRedirectViaContentRelay('signed_redirect');
              if (devRelayResult && devRelayResult.success) {
                setStatus('Sandbox license activated in the dev extension. You can close this tab.', 'ok');
                return;
              }
              if (devRelayResult && devRelayResult.reason === 'device_limit') {
                setStatus('Sandbox checkout verified, but this device cannot activate it because the device limit is full. Free an activation slot in Manage plan & billing, then try again.', 'error');
                return;
              }
              if (devRelayResult && devRelayResult.reason === 'dev_resolver_unreachable') {
                setStatus('Sandbox checkout verified, but the local dev resolver is not running. Start npm run resolver:dev, reload the dev extension, then try checkout again.', 'error');
                return;
              }
              if (devRelayResult && devRelayResult.reason === 'resolver_not_configured') {
                setStatus('Sandbox checkout verified, but the local dev resolver is missing Freemius server credentials. Add FREEMIUS_API_TOKEN and FREEMIUS_DEV_PRODUCT_SECRET_KEY to .env.local, restart npm run resolver:dev, reload the dev extension, then try again.', 'error');
                return;
              }
              setStatus('Freemius Sandbox checkout verified. The live bridge only accepts production licenses, and no dev extension accepted this redirect. For dev activation, run npm run resolver:dev and use the dev extension build.', 'error');
              return;
            }
            var reason = body && body.reason ? ' (' + body.reason + ')' : '';
            setStatus('Checkout verified, but the license key could not be resolved' + reason + '. Check your purchase email and activate manually.', 'error');
            return;
          }

          await forwardKey(String(body.licenseKey).trim(), 'signed_redirect', body.licenseEnvironment);
        } catch (e) {
          setStatus('Automatic activation service could not be reached. Check your purchase email and activate manually.', 'error');
        }
      }

      async function openCheckout() {
        resetCheckoutState();
        openBtn.disabled = true;
        setStatus('Redirecting to secure checkout...', '');

        if (requestedDev && !isLocalBridge) {
          setStatus('Dev checkout is only available on the local bridge.', 'error');
          openBtn.disabled = false;
          return;
        }
        if (isDev && (!sandboxToken || !sandboxCtx || sandboxToken === 'true')) {
          setStatus('Dev checkout sandbox token/context is missing. Rebuild the extension and open checkout from ScoreBlur.', 'error');
          openBtn.disabled = false;
          return;
        }

        var upgradeLicenseKey = await requestUpgradeLicenseKey();
        location.assign(buildHostedCheckoutUrl(upgradeLicenseKey || ''));
      }

      openBtn.addEventListener('click', openCheckout);
      if (hasSignedRedirect) {
        resolveSignedRedirect();
      } else {
        openCheckout();
      }
    }());
  </script>
</body>
</html>
